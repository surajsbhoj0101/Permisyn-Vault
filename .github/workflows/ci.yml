name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: permisyn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d permisyn"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/permisyn?schema=public
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove vendored node_modules
        run: rm -rf backend/node_modules frontend/node_modules

      # Backend
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Apply Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      # Frontend
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --runInBand

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Contracts (Foundry)
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run contract tests
        working-directory: contracts
        run: forge test

