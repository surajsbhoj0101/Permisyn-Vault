name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/permisyn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Backend
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove vendored node_modules
        run: rm -rf backend/node_modules frontend/node_modules

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
      
      - name: Lint backend
        working-directory: backend
        run: npm run lint

      # -------------------------
      # Frontend
      # -------------------------
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --runInBand

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Contracts (Foundry)
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run contract tests
        working-directory: contracts
        run: forge test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/permisyn-vault-backend:latest
            ghcr.io/${{ github.repository_owner }}/permisyn-vault-backend:${{ github.sha }}