services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: permisyn-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://user:password@db:5432/permisyn}
    depends_on:
      - db
    networks:
      - permisyn-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: permisyn-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - permisyn-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: permisyn-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-permisyn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - permisyn-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  permisyn-network:
    driver: bridge
